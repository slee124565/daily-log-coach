name: Release Skill

on:
  push:
    tags:
      - 'v*' # 當推送以 v 開頭的標籤時觸發 (例如 v0.0.5)

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [gemini, claude, codex]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ensure release script is executable
        run: chmod +x ./release.sh

      - name: Package Skill
        run: ./release.sh ${{ matrix.target }}

      - name: Collect asset filename
        run: |
          FILE=$(ls -1 daily-log-coach-${{ matrix.target }}-v*.zip | head -n 1)
          if [ -z "$FILE" ]; then
            echo "❌ 找不到封裝檔案：daily-log-coach-${{ matrix.target }}-v*.zip"
            exit 1
          fi
          echo "PACKAGED_FILE=$FILE" >> $GITHUB_ENV
          echo "✅ 已找到封裝檔案：$FILE"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill-${{ matrix.target }}
          path: ${{ env.PACKAGED_FILE }}

  release:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write # 需要寫入權限來建立 Release

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: skill-*
          merge-multiple: true
          path: release-assets

      - name: Show release assets
        run: |
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
